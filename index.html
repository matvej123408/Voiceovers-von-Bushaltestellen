<script>

let texts=[]
let stopCoords=[]
let index=0
let adding=false
let stopRequested=false
let stopForThisStation=false
let announcedIndex=-1

const langSelect=document.getElementById("langSelect")

const stopSound=new Audio("stop.mp3")

const translations={
"de-DE":"Nächster Halt",
"en-US":"Next stop",
"cs-CZ":"Příští zastávka",
"fr-FR":"Prochain arrêt",
"it-IT":"Prossima fermata",
"uk-UA":"Наступна зупинка"
}

function speak(text){
const u=new SpeechSynthesisUtterance(text)
u.lang=langSelect.value
speechSynthesis.speak(u)
}

function requestStop(){
stopRequested=true
stopForThisStation=true
document.getElementById("stopRequest").style.display="block"
stopSound.play()
}

function nextStop(){

if(index>=texts.length)return

let stopNote=""
if(stopForThisStation){
stopNote=" (STOP REQUESTED)"
}

let now=new Date()

let time=
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0")+":"+
now.getSeconds().toString().padStart(2,"0")

document.getElementById("history").innerHTML+=time+" - "+texts[index]+stopNote+"<br>"

if(stopRequested){
document.getElementById("stopRequest").style.display="none"
stopRequested=false
stopForThisStation=false
}

document.getElementById("displayText").innerText=texts[index]

let phrase=translations[langSelect.value]||"Next stop"

speak(phrase)
speak(texts[index])

index++
announcedIndex=-1

}

function resetStops(){
index=0
document.getElementById("displayText").innerText="Click Next"
}

/* ================= MAP ================= */

const map=L.map("map").setView([50.4501,30.5234],10)

// обычная карта
const normalLayer=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map)

// РЕАЛЬНЫЕ ПРОБКИ (TomTom)
const trafficLayer=L.tileLayer(
"https://{s}.api.tomtom.com/traffic/map/4/tile/flow/{z}/{x}/{y}.png?key=prjTestKey",
{
subdomains:["a","b","c","d"],
maxZoom:19,
opacity:0.8
}
)

let trafficOn=false

function toggleTraffic(){
if(trafficOn){
map.removeLayer(trafficLayer)
}else{
trafficLayer.addTo(map)
}
trafficOn=!trafficOn
}

/* ================= BUS ================= */

let markerLayer=L.layerGroup().addTo(map)
let routingControl=null

const busIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/61/61231.png",
iconSize:[32,32]
})

let busMarker=L.marker([50.4501,30.5234],{icon:busIcon}).addTo(map)

function applyStops(){

const text=document.getElementById("stopsEditor").value.trim()
const lines=text.split("\n")

texts=[]
stopCoords=[]
markerLayer.clearLayers()

let waypoints=[]

lines.forEach(line=>{

let p=line.split(",")

if(p.length===3){

let name=p[0].trim()
let lat=parseFloat(p[1])
let lon=parseFloat(p[2])

texts.push(name)
stopCoords.push([lat,lon])

L.marker([lat,lon]).addTo(markerLayer).bindPopup(name)

waypoints.push(L.latLng(lat,lon))

}

})

if(routingControl){
map.removeControl(routingControl)
}

routingControl=L.Routing.control({
waypoints:waypoints,
lineOptions:{styles:[{color:"blue",weight:5}]},
createMarker:()=>null,
addWaypoints:false
}).addTo(map)

resetStops()

}

function addMarkerMode(){
alert("Click map to add stop")
adding=true
}

map.on("click",function(e){

if(!adding)return

let name=prompt("Stop name")

if(name){

let lat=e.latlng.lat.toFixed(6)
let lon=e.latlng.lng.toFixed(6)

let editor=document.getElementById("stopsEditor")

editor.value+=(editor.value.trim()?"\n":"")+name+","+lat+","+lon

applyStops()

}

adding=false

})

function exportRoute(){

const data=document.getElementById("stopsEditor").value

const blob=new Blob([data],{type:"text/plain"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="bus_route.txt"
a.click()

}

/* ================= GPS ================= */

function distance(lat1,lon1,lat2,lon2){

const R=6371000

const dLat=(lat2-lat1)*Math.PI/180
const dLon=(lon2-lon1)*Math.PI/180

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

navigator.geolocation.watchPosition(function(pos){

const lat=pos.coords.latitude
const lon=pos.coords.longitude

busMarker.setLatLng([lat,lon])

if(index>=stopCoords.length)return

const stop=stopCoords[index]

const dist=distance(lat,lon,stop[0],stop[1])

if(dist<=100 && announcedIndex!==index){

let phrase=translations[langSelect.value]||"Next stop"

speak(phrase)
speak(texts[index])

announcedIndex=index

}

if(dist<=50){
nextStop()
}

})

/* ================= DEFAULT ROUTE ================= */

document.getElementById("stopsEditor").value=

`Kyiv,50.4501,30.5234
Boryspil,50.3450,30.8947
Poltava,49.5883,34.5514
Kharkiv,49.9935,36.2304`

applyStops()

</script>
